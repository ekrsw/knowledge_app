services:
  db:
    image: postgres:17.4-alpine
    container_name: test_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_DB: my_database
      POSTGRES_USER: my_user
      POSTGRES_PASSWORD: my_password
      POSTGRES_INITDB_ARGS: --encoding=UTF-8
      TZ: Asia/Tokyo
    volumes:
      - user_data:/var/lib/postgresql/data
    ports:
      - 5432:5432
volumes:
  user_data: